name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Сборка не требует живой БД, но переменные должны существовать,
          # чтобы конфиг Payload инициализировался без ошибок.
          PAYLOAD_SECRET: ci-placeholder-secret-not-used-at-runtime
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          NEXT_TELEMETRY_DISABLED: '1'
