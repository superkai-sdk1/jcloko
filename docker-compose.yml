services:
  # Выставляет права на том медиа для непривилегированного пользователя app (uid 1001),
  # иначе именованный том создаётся под root и загрузка файлов падает с EACCES.
  media-init:
    image: alpine
    command: sh -c "mkdir -p /media && chown -R 1001:1001 /media"
    volumes:
      - media:/media
    restart: 'no'

  app:
    # На VPS берём готовый образ из GHCR (собран в CI): docker compose pull.
    # build остаётся запасным вариантом для локальной сборки.
    image: ${APP_IMAGE:-judo-app:latest}
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      media-init:
        condition: service_completed_successfully
    volumes:
      - media:/app/media
    expose:
      - '3000'

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  media:
  caddy_data:
  caddy_config:
